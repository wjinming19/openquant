<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenQuant - 量化分析平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .status {
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: 500;
        }
        .value {
            font-family: monospace;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .links {
            margin-top: 40px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid white;
            color: white;
        }
        .footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.7;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .feature-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .feature-desc {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📊</div>
        <h1>OpenQuant</h1>
        <p class="subtitle">A股 + 港股 量化分析平台</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📈</div>
                <div class="feature-title">技术指标</div>
                <div class="feature-desc">MACD、RSI、布林带、均线系统</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <div class="feature-title">量化选股</div>
                <div class="feature-desc">多因子评分 + 星级评级系统</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">大盘情绪</div>
                <div class="feature-desc">实时市场情绪温度监控</div>
            </div>
        </div>
        
        <div class="status">
            <div class="status-item">
                <span class="label">🟢 后端API</span>
                <span class="value">http://170.106.119.80:8089</span>
            </div>
            <div class="status-item">
                <span class="label">🟢 前端界面</span>
                <span class="value">http://170.106.119.80:8090</span>
            </div>
            <div class="status-item">
                <span class="label">📅 部署时间</span>
                <span class="value">2026-03-15</span>
            </div>
            <div class="status-item">
                <span class="label">📦 版本</span>
                <span class="value">v1.0.0 MVP</span>
            </div>
        </div>
        
        <div class="links">
            <a href="http://170.106.119.80:8090" class="btn">🚀 进入系统</a>
            <a href="http://170.106.119.80:8089/docs" class="btn btn-secondary">📚 API文档</a>
        </div>
        
        <div class="footer">
            <p>数据来源：东方财富Cookie + AKShare + yfinance</p>
            <p>支持市场：A股 + 港股 + ETF</p>
        </div>
    </div>
</body>
</html>
