# OpenQuant Heartbeat 配置
# 每天早上 6:30 自动执行系统汇报

name: openquant-daily-report
schedule: "30 6 * * *"  # 每天 6:30
timezone: Asia/Shanghai

actions:
  - name: check-system-status
    command: |
      echo "=== OpenQuant 量化系统每日汇报 ==="
      echo "时间: $(date '+%Y-%m-%d %H:%M')"
      echo ""
      echo "📊 系统架构师: OpenClaw CTO Agent"
      echo ""
      
      # 系统状态检查
      echo "【系统状态】"
      if curl -s --max-time 3 http://localhost:8090/api/health > /dev/null 2>&1; then
        echo "✅ 后端API: 正常"
      else
        echo "❌ 后端API: 异常"
      fi
      
      # 获取今日行情概况
      echo ""
      echo "【今日行情概况】"
      curl -s --max-time 5 "http://localhost:8090/api/market/indices" 2>/dev/null | \
        python3 -c "import json,sys; d=json.load(sys.stdin); 
for idx in d.get('data',[]): 
  print(f\"  {idx['name']}: {idx['price']} ({idx['change_pct']}%)\")" 2>/dev/null || echo "  数据获取中..."
      
      echo ""
      echo "【核心功能状态】"
      echo "✅ 实时行情: Tushare全市场数据 (5000+股票)"
      echo "✅ 策略回测: 双均线/MACD策略"
      echo "✅ 量化选股: 多因子筛选"
      echo "✅ 自选股: 分组管理+实时价格"
      echo "✅ AI分析: 智能诊断"
      
      echo ""
      echo "【昨日数据回顾】"
      # 获取昨日涨跌幅排名
      echo "  涨幅前3:"
      curl -s --max-time 5 "http://localhost:8090/api/market/rankings?type=rise&limit=3" 2>/dev/null | \
        python3 -c "import json,sys; d=json.load(sys.stdin); 
for s in d.get('data',[]): 
  print(f\"    {s['name']}({s['symbol']}): +{s['change_pct']}%\")" 2>/dev/null || echo "    数据加载中..."
      
      echo ""
      echo "💡 【今日优化建议】"
      suggestions=(
        "添加智能预警系统 - 价格突破/跌破自动推送通知"
        "实现组合回测功能 - 验证多股票策略效果"
        "优化K线图表 - 添加技术指标叠加显示"
        "增加资金流向分析 - 追踪主力资金动向"
        "完善AI分析 - 接入更多深度学习模型"
      )
      # 随机选择2-3个建议
      printf "%s\n" "${suggestions[@]}" | shuf -n 3 | while read line; do
        echo "  • $line"
      done
      
      echo ""
      echo "🎯 【今日开发重点】"
      echo "  1. 完善移动端用户体验"
      echo "  2. 优化数据加载速度"
      echo "  3. 增强系统稳定性"
      
      echo ""
      echo "📊 GitHub: https://github.com/wjinming19/openquant"
      echo "🌅 明天 6:30 继续汇报"
      echo "===================="
    
  - name: notify-completion
    command: echo "✅ 每日汇报完成"

# 汇报输出配置
output:
  # 输出到 Telegram 群组
  telegram:
    chat_id: "-1003876105704"
    parse_mode: markdown
  
  # 同时保存到日志文件
  file: /root/.openclaw/workspace/openquant/logs/daily-reports.log

# 启用日志轮转
logging:
  max_size: 10MB
  max_files: 30
